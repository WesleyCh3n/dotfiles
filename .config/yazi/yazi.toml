[mgr]
ratio = [1,2,5]

[preview]
# change following need to `yazi --clear-cache` to take effect
tab_size = 2
max_width  = 1000
max_height = 1000

[open]
prepend_rules = [
  { url = "*.html", use = "browser" },
  { mime = "text/html", use = "browser" }
]

[opener]
browser = [
  { run = 'open "$1"', desc = "Open in Browser" }
]
